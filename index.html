<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bento Grid — Dynamic Layout Tester</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --max-width: 1600px;
      --gap: 16px;
      --radius: 24px;
      --tile-unit: 140px;
      --surface: #f4f7fb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ef;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      max-width: calc(var(--max-width) + 48px);
      margin: 0 auto;
      padding: 24px 24px 64px;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2vw, 2rem);
      font-weight: 700;
    }

    header p {
      margin: 0;
      color: var(--muted);
      max-width: 72ch;
    }

    body.is-resizing {
      cursor: inherit;
      user-select: none;
    }

    body.is-resizing *,
    body.is-column-dragging * {
      user-select: none;
    }

    body.is-column-dragging {
      cursor: grabbing;
    }

    .controls {
      display: grid;
      gap: 16px;
      padding: 20px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 180px;
      flex: 1;
    }

    .field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
      background: #fff;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, #1e4f8f 0%, #2cb8a0 100%);
      color: #fff;
    }

    .btn-secondary {
      background: #e8eef7;
      color: var(--text);
    }

    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
    }

    .hint {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .hint code {
      background: #eef2f7;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.8rem;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .stats strong {
      color: var(--text);
    }

    .bento-wrap {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .bento-grid {
      display: flex;
      align-items: stretch;
      gap: var(--gap);
      width: 100%;
      min-height: 0;
      touch-action: none;
    }

    .bento-column {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      min-width: 0;
      flex: 1 1 0%;
      height: auto;
      transition: opacity 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .bento-column.is-dragging {
      opacity: 0.45;
      transform: scale(0.985);
    }

    .bento-column.is-drop-target {
      box-shadow: inset 0 0 0 3px rgba(44, 184, 160, 0.85);
      border-radius: var(--radius);
    }

    .column-drag-handle {
      position: absolute;
      top: 10px;
      left: 50%;
      z-index: 25;
      display: grid;
      place-items: center;
      width: 44px;
      height: 28px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: grab;
      touch-action: none;
      opacity: 0;
      transition: opacity 0.15s ease, background 0.15s ease;
    }

    .bento-column:hover .column-drag-handle,
    .column-drag-handle.is-active {
      opacity: 1;
    }

    .column-drag-handle:hover {
      background: rgba(30, 79, 143, 0.85);
    }

    .column-drag-handle.is-active {
      cursor: grabbing;
    }

    .bento-item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      flex: 0 0 auto;
      height: calc(var(--row-weight, 1) * var(--tile-unit));
      min-height: calc(var(--row-weight, 1) * var(--tile-unit));
      isolation: isolate;
    }

    .bento-item.is-resizing {
      outline: 2px solid rgba(255, 255, 255, 0.85);
      outline-offset: -2px;
    }

    .resize-handle {
      position: absolute;
      z-index: 20;
      touch-action: none;
    }

    .resize-handle::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.25);
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .bento-item:hover .resize-handle::after,
    .resize-handle.is-active::after {
      opacity: 1;
    }

    .resize-handle--row {
      left: 50%;
      bottom: -10px;
      width: 56px;
      height: 20px;
      transform: translateX(-50%);
      cursor: ns-resize;
    }

    .resize-handle--row::after {
      width: 36px;
      height: 6px;
    }

    .resize-handle--col {
      top: 50%;
      right: -10px;
      width: 20px;
      height: 56px;
      transform: translateY(-50%);
      cursor: ew-resize;
    }

    .resize-handle--col::after {
      width: 6px;
      height: 36px;
    }

    .resize-handle--corner {
      right: 6px;
      bottom: 6px;
      width: 22px;
      height: 22px;
      cursor: nwse-resize;
    }

    .resize-handle--corner::after {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.95);
    }

    .bento-item__media {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.05) 0%, rgba(15, 23, 42, 0.55) 100%),
        var(--tile-image, linear-gradient(135deg, #93c5fd, #67e8f9));
      background-size: cover;
      background-position: center;
    }

    .bento-item__content {
      position: absolute;
      inset: auto 0 0 0;
      padding: 22px 24px 24px;
      color: #fff;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0) 0%, rgba(15, 23, 42, 0.45) 100%);
    }

    .bento-item__category {
      margin: 0 0 8px;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0.88;
    }

    .bento-item__title {
      margin: 0;
      font-size: clamp(1.05rem, 1.35vw, 1.45rem);
      font-weight: 700;
      line-height: 1.2;
    }

    .bento-item__badge {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 0.95rem;
    }

    .bento-item__close {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 25;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .bento-item:hover .bento-item__close,
    .preview-stage--mobile .bento-item__close {
      opacity: 1;
    }

    .bento-item__close:hover {
      background: rgba(185, 28, 28, 0.85);
      transform: scale(1.05);
    }

    .empty-state {
      width: 100%;
      padding: 48px 24px;
      text-align: center;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      background: #fff;
    }

    .html-export {
      margin-top: 32px;
      padding: 20px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .html-export__header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .html-export__header label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .html-export textarea {
      width: 100%;
      min-height: 320px;
      margin-top: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      line-height: 1.55;
      resize: vertical;
      background: #0f172a;
      color: #e2e8f0;
    }

    .view-toggle {
      display: inline-flex;
      padding: 4px;
      background: #e8eef7;
      border-radius: 999px;
      gap: 4px;
    }

    .view-toggle__btn {
      border: 0;
      border-radius: 999px;
      padding: 8px 18px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }

    .view-toggle__btn:hover {
      color: var(--text);
      transform: none;
    }

    .view-toggle__btn.is-active {
      background: #fff;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
    }

    .preview-stage {
      width: 100%;
      margin: 0 auto;
      transition: max-width 0.25s ease, padding 0.25s ease;
    }

    .preview-stage__chrome {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }

    .preview-stage__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cbd5e1;
    }

    .preview-stage--desktop {
      max-width: var(--max-width);
    }

    .preview-stage--mobile {
      max-width: 390px;
      padding: 14px;
      background: #0f172a;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
    }

    .preview-stage--mobile .preview-stage__chrome {
      color: rgba(255, 255, 255, 0.72);
    }

    .preview-stage--mobile .preview-stage__dot {
      background: rgba(255, 255, 255, 0.35);
    }

    .preview-stage--mobile .bento-wrap {
      max-width: none;
    }

    .preview-stage--mobile .bento-item {
      min-height: calc(var(--row-weight, 1) * 120px);
    }

    .preview-stage--mobile .bento-grid {
      flex-direction: column;
    }

    .preview-stage--mobile .bento-column {
      flex: none;
      width: 100%;
    }

    .preview-stage--mobile .resize-handle,
    .preview-stage--mobile .column-drag-handle {
      display: none;
    }

    @media (max-width: 1024px) {
      .preview-stage--desktop .bento-item {
        min-height: calc(var(--row-weight, 1) * 120px);
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px 16px 48px;
      }

      .controls {
        padding: 16px;
      }

      .preview-stage--desktop .bento-grid {
        flex-direction: column;
        min-height: 0;
      }

      .preview-stage--desktop .bento-column {
        flex: none;
      }

      .preview-stage--desktop .bento-item {
        flex: 0 0 auto !important;
        min-height: calc(var(--row-weight, 1) * 180px);
      }

      .preview-stage--desktop .resize-handle,
      .preview-stage--desktop .column-drag-handle {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Bento Grid Layout Tester</h1>
      <p>
        Use <strong>Desktop</strong> or <strong>Mobile</strong> preview to switch layouts. The HTML export below
        updates live — copy and paste it into your site.
      </p>
    </header>

    <section class="controls" aria-label="Bento grid controls">
      <div class="controls-row">
        <div class="field">
          <label for="itemCount">Number of boxes</label>
          <input id="itemCount" type="number" min="0" max="24" value="10" />
        </div>
        <div class="field">
          <label for="preset">Quick preset</label>
          <select id="preset">
            <option value="demo10" selected>Demo — 10 tiles (reference)</option>
            <option value="demo7">Demo — 7 tiles</option>
            <option value="count">Use count only</option>
          </select>
        </div>
        <div class="field">
          <label>Preview</label>
          <div class="view-toggle" role="group" aria-label="Preview mode">
            <button type="button" class="view-toggle__btn is-active" data-view="desktop" id="viewDesktop">Desktop</button>
            <button type="button" class="view-toggle__btn" data-view="mobile" id="viewMobile">Mobile</button>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button type="button" class="btn-primary" id="renderBtn">Render grid</button>
        <button type="button" class="btn-secondary" id="addBtn">+ Add one box</button>
        <button type="button" class="btn-danger" id="removeBtn">− Remove last box</button>
        <button type="button" class="btn-secondary" id="resetBtn">Reset to demo</button>
        <button type="button" class="btn-secondary" id="resetLayoutBtn">Reset sizes</button>
      </div>

      <div class="stats" id="stats"></div>
    </section>

    <div class="preview-stage preview-stage--desktop" id="previewStage">
      <div class="preview-stage__chrome" id="previewLabel">
        <span class="preview-stage__dot"></span>
        Desktop · 1600px
        <span class="preview-stage__dot"></span>
      </div>
      <div class="bento-wrap">
        <div class="bento-grid" id="bentoGrid" aria-live="polite"></div>
      </div>
    </div>

    <section class="html-export" id="htmlExport" hidden>
      <div class="html-export__header">
        <label for="htmlOutput">Export HTML</label>
        <button type="button" class="btn-secondary" id="copyHtmlBtn">Copy HTML</button>
      </div>
      <p class="hint">Live code for your layout — updates when you resize, reorder columns, or remove tiles.</p>
      <textarea id="htmlOutput" readonly spellcheck="false" aria-label="Generated HTML export"></textarea>
    </section>
  </div>

  <script>
    const DEMO_10 = [
      { category: "Cloud", title: "Cloud Services", image: "linear-gradient(135deg, #64748b 0%, #334155 100%)" },
      { category: "AI", title: "AI Contact Center", image: "linear-gradient(135deg, #475569 0%, #1e293b 100%)" },
      { category: "Energy", title: "Energy Management Solution", image: "linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%)" },
      { category: "Cybersecurity", title: "Managed Cybersecurity Services", image: "linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 100%)" },
      { category: "Broadband", title: "Business Broadband", image: "linear-gradient(135deg, #38bdf8 0%, #2563eb 100%)" },
      { category: "Digital Signage", title: "Digital Signage Display", image: "linear-gradient(135deg, #06b6d4 0%, #0e7490 100%)" },
      { category: "Exchange", title: "HKT SkyExchange", image: "linear-gradient(135deg, #0891b2 0%, #155e75 100%)" },
      { category: "Smart Office", title: "Smart Office", image: "linear-gradient(135deg, #2563eb 0%, #1e40af 100%)" },
      { category: "Smart Building", title: "Smart Building", image: "linear-gradient(135deg, #14b8a6 0%, #0f766e 100%)" },
      { category: "Enterprise", title: "Enterprise Managed Services", image: "linear-gradient(135deg, #6366f1 0%, #4338ca 100%)" }
    ];

    const DEMO_7 = [
      { category: "Mobility", title: "AI Contactless Car Park", image: "linear-gradient(135deg, #64748b 0%, #334155 100%)" },
      { category: "Events", title: "Smart Event Management", image: "linear-gradient(135deg, #475569 0%, #1e293b 100%)" },
      { category: "Highlights", title: "A Year of Breakthroughs and Excellence", image: "linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%)" },
      { category: "Connectivity", title: "5G MESH Wi-Fi Solution", image: "linear-gradient(135deg, #38bdf8 0%, #1d4ed8 100%)" },
      { category: "Convergence", title: "Fixed and Mobile Convergence (FMC) Solutions", image: "linear-gradient(135deg, #06b6d4 0%, #0e7490 100%)" },
      { category: "IT", title: "Managed IT Services", image: "linear-gradient(135deg, #2563eb 0%, #1e40af 100%)" },
      { category: "Security", title: "Managed Network Security Solution", image: "linear-gradient(135deg, #0891b2 0%, #155e75 100%)" }
    ];

    const PLACEHOLDER_GRADIENTS = [
      "linear-gradient(135deg, #60a5fa 0%, #2563eb 100%)",
      "linear-gradient(135deg, #22d3ee 0%, #0891b2 100%)",
      "linear-gradient(135deg, #34d399 0%, #059669 100%)",
      "linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%)",
      "linear-gradient(135deg, #f472b6 0%, #db2777 100%)",
      "linear-gradient(135deg, #fb923c 0%, #ea580c 100%)"
    ];

    const WEIGHT_PATTERNS = {
      1: [[12]],
      2: [[7, 5], [5, 7], [6, 6]],
      3: [[5, 4, 3], [3, 5, 4], [4, 3, 5]],
      4: [[4, 3, 3, 2], [3, 4, 3, 2], [3, 3, 4, 2], [3, 3, 3, 3]],
      5: [[3, 3, 2, 2, 2], [2, 3, 3, 2, 2], [3, 2, 3, 2, 2]],
      6: [[2, 2, 2, 2, 2, 2], [3, 2, 2, 2, 2, 1]],
      7: [[2, 2, 2, 2, 2, 1, 1], [2, 2, 2, 2, 1, 2, 1]],
      8: [[2, 2, 2, 2, 1, 1, 1, 1]]
    };

    const itemCountInput = document.getElementById("itemCount");
    const presetSelect = document.getElementById("preset");
    const bentoGrid = document.getElementById("bentoGrid");
    const stats = document.getElementById("stats");
    const htmlExport = document.getElementById("htmlExport");
    const htmlOutput = document.getElementById("htmlOutput");
    const previewStage = document.getElementById("previewStage");
    const previewLabel = document.getElementById("previewLabel");
    const viewDesktopBtn = document.getElementById("viewDesktop");
    const viewMobileBtn = document.getElementById("viewMobile");

    const MIN_FLEX = 0.35;
    const MIN_TILE_HEIGHT = 48;
    const TILE_UNIT = 140;
    const TILE_UNIT_MOBILE = 120;
    const LAYOUT_GAP = 16;
    let previewMode = window.matchMedia("(max-width: 640px)").matches ? "mobile" : "desktop";
    let layoutState = {
      key: "",
      columnFlex: [],
      rowFlex: [],
      columnTileIndexes: [],
      tileHeightPx: null
    };
    let activeDrag = null;
    let columnDrag = null;
    let currentTiles = [];
    let activeTiles = null;
    let currentColumnCount = 3;

    function getColumnCount() {
      return previewMode === "mobile" ? 1 : 3;
    }

    function isEditableLayout() {
      return previewMode === "desktop";
    }

    function getLayoutKey(tiles, columnCount) {
      return `${previewMode}-${tiles.length}-${columnCount}`;
    }

    function updatePreviewChrome() {
      previewStage.className = `preview-stage preview-stage--${previewMode}`;
      viewDesktopBtn.classList.toggle("is-active", previewMode === "desktop");
      viewMobileBtn.classList.toggle("is-active", previewMode === "mobile");
      previewLabel.innerHTML = previewMode === "mobile"
        ? '<span class="preview-stage__dot"></span> Mobile · 390px <span class="preview-stage__dot"></span>'
        : '<span class="preview-stage__dot"></span> Desktop · 1600px <span class="preview-stage__dot"></span>';
    }

    function setPreviewMode(mode) {
      if (previewMode === mode) return;
      previewMode = mode;
      updatePreviewChrome();
      renderGrid({ useActiveTiles: true });
    }

    function makeGenericTile(index) {
      return {
        category: `Category ${index + 1}`,
        title: `Tile ${index + 1}`,
        description: "Auto-generated placeholder content for layout testing.",
        image: PLACEHOLDER_GRADIENTS[index % PLACEHOLDER_GRADIENTS.length]
      };
    }

    function buildTilesFromCount(count) {
      return Array.from({ length: count }, (_, index) => makeGenericTile(index));
    }

    function distributeToColumns(count, columnCount) {
      const columns = Array.from({ length: columnCount }, () => []);
      const base = Math.floor(count / columnCount);
      const extra = count % columnCount;
      let tileIndex = 0;

      for (let column = 0; column < columnCount; column += 1) {
        const size = base + (column < extra ? 1 : 0);
        for (let i = 0; i < size; i += 1) {
          columns[column].push(tileIndex);
          tileIndex += 1;
        }
      }

      return columns;
    }

    function getColumnWeights(itemCount, columnIndex) {
      const patterns = WEIGHT_PATTERNS[itemCount] ?? WEIGHT_PATTERNS[Math.min(itemCount, 8)];
      const pattern = patterns[columnIndex % patterns.length];
      const total = pattern.reduce((sum, weight) => sum + weight, 0);

      if (total === 12) {
        return pattern;
      }

      const scale = 12 / total;
      const scaled = pattern.map((weight) => Math.max(1, Math.round(weight * scale)));
      const diff = 12 - scaled.reduce((sum, weight) => sum + weight, 0);

      if (diff !== 0) {
        scaled[0] += diff;
      }

      return scaled;
    }

    function buildDefaultLayoutState(tiles, columnCount) {
      const columnTileIndexes = distributeToColumns(tiles.length, columnCount);
      const initialRowFlex = columnTileIndexes.map((tileIndexes, columnIndex) => {
        const weights = getColumnWeights(tileIndexes.length, columnIndex);
        return tileIndexes.map((tileIndex, position) => tiles[tileIndex].weight ?? weights[position] ?? 1);
      });
      const { rowFlex, tileHeightPx } = finalizeLayoutWeights(initialRowFlex, columnTileIndexes);

      return {
        key: getLayoutKey(tiles, columnCount),
        columnFlex: Array(columnCount).fill(1),
        rowFlex,
        tileHeightPx,
        columnTileIndexes
      };
    }

    function ensureLayoutState(tiles, columnCount, forceReset = false) {
      const key = getLayoutKey(tiles, columnCount);

      if (forceReset || layoutState.key !== key) {
        layoutState = buildDefaultLayoutState(tiles, columnCount);
        return layoutState;
      }

      const defaultState = buildDefaultLayoutState(tiles, columnCount);

      if (layoutState.columnTileIndexes.length !== columnCount) {
        layoutState.columnTileIndexes = defaultState.columnTileIndexes;
        layoutState.rowFlex = defaultState.rowFlex;
        layoutState.columnFlex = defaultState.columnFlex;
        layoutState.tileHeightPx = defaultState.tileHeightPx;
      }

      return layoutState;
    }

    function recomputeTileHeights() {
      layoutState.tileHeightPx = computeTileHeightPx(
        layoutState.rowFlex,
        layoutState.columnTileIndexes
      );
    }

    function ensureTileHeightPx() {
      if (layoutState.tileHeightPx?.length) return;

      layoutState.tileHeightPx = layoutState.columnTileIndexes.map((column, columnIndex) =>
        column.map((_, rowIndex) =>
          Math.max(
            MIN_TILE_HEIGHT,
            Math.round(weightToHeight(layoutState.rowFlex[columnIndex]?.[rowIndex] ?? 1))
          )
        )
      );
    }

    function setSharedRowHeightPx(rowIndex, heightPx) {
      ensureTileHeightPx();
      const next = layoutState.tileHeightPx.map((columnHeights) => [...columnHeights]);
      const safeHeight = Math.max(MIN_TILE_HEIGHT, Math.round(heightPx));

      layoutState.columnTileIndexes.forEach((column, columnIndex) => {
        if (rowIndex < column.length) {
          next[columnIndex][rowIndex] = safeHeight;
        }
      });

      layoutState.tileHeightPx = next;
    }

    function updateTileHeightsAfterRowResize(columnIndex, rowIndex) {
      ensureTileHeightPx();

      const topPx = Math.max(
        MIN_TILE_HEIGHT,
        Math.round(weightToHeight(layoutState.rowFlex[columnIndex][rowIndex]))
      );
      const bottomPx = Math.max(
        MIN_TILE_HEIGHT,
        Math.round(weightToHeight(layoutState.rowFlex[columnIndex][rowIndex + 1]))
      );

      setSharedRowHeightPx(rowIndex, topPx);
      setSharedRowHeightPx(rowIndex + 1, bottomPx);
    }

    function swapColumns(fromIndex, toIndex) {
      if (fromIndex === toIndex) return;

      const swap = (array) => {
        [array[fromIndex], array[toIndex]] = [array[toIndex], array[fromIndex]];
      };

      swap(layoutState.columnTileIndexes);
      swap(layoutState.rowFlex);
      swap(layoutState.columnFlex);
      recomputeTileHeights();
    }

    function getColumnIndexAtX(clientX) {
      const columns = [...bentoGrid.querySelectorAll(".bento-column")];
      if (!columns.length) return 0;

      let closestIndex = 0;
      let closestDistance = Number.POSITIVE_INFINITY;

      columns.forEach((column, index) => {
        const rect = column.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const distance = Math.abs(clientX - center);

        if (distance < closestDistance) {
          closestDistance = distance;
          closestIndex = index;
        }
      });

      return closestIndex;
    }

    function updateColumnDropTargets(overIndex, fromIndex) {
      bentoGrid.querySelectorAll(".bento-column").forEach((column, index) => {
        column.classList.toggle("is-drop-target", index === overIndex && overIndex !== fromIndex);
        column.classList.toggle("is-dragging", index === fromIndex);
      });
    }

    function clearColumnDropTargets() {
      bentoGrid.querySelectorAll(".bento-column").forEach((column) => {
        column.classList.remove("is-drop-target", "is-dragging");
      });
      document.querySelectorAll(".column-drag-handle.is-active").forEach((handle) => {
        handle.classList.remove("is-active");
      });
    }

    function clampFlex(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getTileUnit() {
      return previewMode === "mobile" ? TILE_UNIT_MOBILE : TILE_UNIT;
    }

    function weightToHeight(weight) {
      return weight * getTileUnit();
    }

    function applyTileHeight(element, weight) {
      const height = Math.max(MIN_TILE_HEIGHT, Math.round(weightToHeight(weight)));
      element.style.setProperty("--row-weight", String(weight));
      element.style.flex = "0 0 auto";
      element.style.height = `${height}px`;
      element.style.minHeight = `${height}px`;
    }

    function applyTileHeightPx(element, heightPx, weight) {
      const height = Math.max(MIN_TILE_HEIGHT, heightPx);
      element.style.setProperty("--row-weight", String(weight));
      element.style.flex = "0 0 auto";
      element.style.height = `${height}px`;
      element.style.minHeight = `${height}px`;
    }

    function getTileHeightPx(columnIndex, rowIndex, weight) {
      return layoutState.tileHeightPx?.[columnIndex]?.[rowIndex]
        ?? Math.max(MIN_TILE_HEIGHT, Math.round(weightToHeight(weight)));
    }

    function applyColumnBottomStretch(tileHeightPx, columnTileIndexes) {
      const columnHeights = columnTileIndexes.map((column, columnIndex) => {
        if (!column.length) return 0;
        const tileSum = tileHeightPx[columnIndex].reduce((sum, height) => sum + height, 0);
        return tileSum + (column.length - 1) * LAYOUT_GAP;
      });
      const maxColumnHeight = Math.max(...columnHeights.filter((height) => height > 0), 0);

      return tileHeightPx.map((columnHeightsPx, columnIndex) => {
        const column = columnTileIndexes[columnIndex];
        if (!column.length) return columnHeightsPx;

        const deficit = maxColumnHeight - columnHeights[columnIndex];
        if (deficit <= 0) return columnHeightsPx;

        const next = columnHeightsPx.map((height, rowIndex) => {
          if (rowIndex === column.length - 1) {
            return Math.max(MIN_TILE_HEIGHT, height + Math.round(deficit));
          }
          return height;
        });
        return next;
      });
    }

    function sumColumnWeights(weights) {
      return weights.reduce((sum, weight) => sum + weight, 0);
    }

    function applyTileFromLayout(element, columnIndex, rowIndex, weight) {
      applyTileHeightPx(element, getTileHeightPx(columnIndex, rowIndex, weight), weight);
    }

    function equalizeSharedRowWeights(rowFlex, columnTileIndexes) {
      const result = rowFlex.map((columnFlex) => [...columnFlex]);
      const maxRows = Math.max(...columnTileIndexes.map((column) => column.length), 0);

      for (let rowIndex = 0; rowIndex < maxRows; rowIndex += 1) {
        const columnsAtRow = columnTileIndexes
          .map((column, columnIndex) => ({ columnIndex, hasTile: rowIndex < column.length }))
          .filter(({ hasTile }) => hasTile);

        if (columnsAtRow.length < 2) continue;

        const averageWeight = columnsAtRow.reduce(
          (sum, { columnIndex }) => sum + result[columnIndex][rowIndex],
          0
        ) / columnsAtRow.length;

        columnsAtRow.forEach(({ columnIndex }) => {
          result[columnIndex][rowIndex] = averageWeight;
        });
      }

      return result;
    }

    function computeTileHeightPx(rowFlex, columnTileIndexes) {
      const tileHeightPx = columnTileIndexes.map((column, columnIndex) =>
        column.map((_, rowIndex) => {
          const peerColumns = columnTileIndexes
            .map((peerColumn, peerIndex) => (rowIndex < peerColumn.length ? peerIndex : -1))
            .filter((peerIndex) => peerIndex >= 0);

          if (peerColumns.length >= 2) {
            const averageWeight = peerColumns.reduce(
              (sum, peerIndex) => sum + rowFlex[peerIndex][rowIndex],
              0
            ) / peerColumns.length;
            return Math.max(MIN_TILE_HEIGHT, Math.round(weightToHeight(averageWeight)));
          }

          return Math.max(MIN_TILE_HEIGHT, Math.round(weightToHeight(rowFlex[columnIndex][rowIndex])));
        })
      );

      return applyColumnBottomStretch(tileHeightPx, columnTileIndexes);
    }

    function finalizeLayoutWeights(rowFlex, columnTileIndexes) {
      const balanced = equalizeSharedRowWeights(rowFlex, columnTileIndexes);

      return {
        rowFlex: balanced,
        tileHeightPx: computeTileHeightPx(balanced, columnTileIndexes)
      };
    }

    function applyFlexToGrid() {
      const columns = bentoGrid.querySelectorAll(".bento-column");

      columns.forEach((column) => {
        const columnIndex = Number(column.dataset.column);
        column.style.flex = `${layoutState.columnFlex[columnIndex] ?? 1} 1 0%`;

        const items = column.querySelectorAll(".bento-item");
        items.forEach((item, rowIndex) => {
          const weight = layoutState.rowFlex[columnIndex]?.[rowIndex] ?? 1;
          applyTileHeightPx(item, getTileHeightPx(columnIndex, rowIndex, weight), weight);
        });
      });
    }

    const EXPORT_CSS = `.bento-wrap {
  width: 100%;
  max-width: 1600px;
  margin: 0 auto;
}

.bento-grid {
  display: flex;
  align-items: stretch;
  gap: 16px;
  width: 100%;
}

.bento-column {
  display: flex;
  flex-direction: column;
  gap: 16px;

  flex: 1 1 0%;
}

.bento-item {

.bento-item__content {
  position: absolute;
  inset: auto 0 0 0;
  padding: 22px 24px 24px;
  color: #fff;

}

.bento-item__category {
  margin: 0 0 8px;
  font-size: 0.82rem;
  font-weight: 500;
  opacity: 0.88;
}

.bento-item__title {
  margin: 0;
  font-size: clamp(1.05rem, 1.35vw, 1.45rem);
  font-weight: 700;
  line-height: 1.2;

  .bento-grid {
    flex-direction: column;
  }

  .bento-column {
    flex: none;
    width: 100%;
  }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getTileBackgroundStyle(image) {
      if (!image) {
        return "background-image: linear-gradient(135deg, #93c5fd, #67e8f9);";
      }

      if (image.startsWith("http")) {
        return `background-image: linear-gradient(180deg, rgba(15, 23, 42, 0.08), rgba(15, 23, 42, 0.22)), url("${image}");`;
      }

      return `background-image: linear-gradient(180deg, rgba(15, 23, 42, 0.08), rgba(15, 23, 42, 0.22)), ${image};`;
    }

    function generateExportHtml() {
      const tiles = activeTiles || currentTiles;
      if (!tiles.length || !layoutState.columnTileIndexes.length) {
        return "<!-- Add tiles to generate HTML -->";
      }

      const columnsHtml = layoutState.columnTileIndexes.map((tileIndexes, columnIndex) => {
        const columnFlex = (layoutState.columnFlex[columnIndex] ?? 1).toFixed(3);
        const itemsHtml = tileIndexes.map((tileIndex, rowIndex) => {
          const tile = tiles[tileIndex];
          if (!tile) return "";

          const weight = layoutState.rowFlex[columnIndex]?.[rowIndex] ?? 1;
          const tileHeight = layoutState.tileHeightPx?.[columnIndex]?.[rowIndex]
            ?? Math.round(weightToHeight(weight));
          const category = escapeHtml(tile.category ?? "");
          const title = escapeHtml(tile.title ?? `Tile ${tileIndex + 1}`);
          const mediaStyle = getTileBackgroundStyle(tile.image);

          return [
            "      <article class=\"bento-item\" style=\"height: " + tileHeight + "px; min-height: " + tileHeight + "px\">",
            "        <div class=\"bento-item__media\" style=\"" + mediaStyle + "\"></div>",
            "        <div class=\"bento-item__content\">",
            "          <p class=\"bento-item__category\">" + category + "</p>",
            "          <h2 class=\"bento-item__title\">" + title + "</h2>",
            "        </div>",
            "      </article>"
          ].join("\n");
        }).filter(Boolean).join("\n");

        return [
          "    <div class=\"bento-column\" style=\"flex: " + columnFlex + " 1 0\">",
          itemsHtml,
          "    </div>"
        ].join("\n");
      }).join("\n");

      return [
        "<style>",
        EXPORT_CSS,
        "</style>",
        "",
        "<div class=\"bento-wrap\">",
        "  <div class=\"bento-grid\">",
        columnsHtml,
        "  </div>",
        "</div>"
      ].join("\n");
    }

    function updateHtmlExport() {
      if (!currentTiles.length && !(activeTiles && activeTiles.length)) {
        htmlExport.hidden = true;
        htmlOutput.value = "";
        return;
      }

      htmlExport.hidden = false;
      htmlOutput.value = generateExportHtml();
    }

    function getDemoTiles(preset, count) {
      const source = preset === "demo7" ? DEMO_7 : DEMO_10;
      return source.slice(0, count || source.length).map((tile, index) => ({
        ...makeGenericTile(index),
        ...tile,
        category: tile.category ?? `Category ${index + 1}`,
        description: tile.description ?? ""
      }));
    }

    function resolveTiles() {
      const preset = presetSelect.value;
      const count = Math.max(0, Math.min(24, Number(itemCountInput.value) || 0));
      itemCountInput.value = String(count);

      if (preset === "demo10" || preset === "demo7") {
        return getDemoTiles(preset, count || (preset === "demo7" ? DEMO_7.length : DEMO_10.length));
      }

      return buildTilesFromCount(count);
    }

    function rebalanceLayoutAfterRemoval(removedIndex) {
      const columnCount = getColumnCount();
      let removedColumn = -1;
      let removedRow = -1;

      layoutState.columnTileIndexes.forEach((column, columnIndex) => {
        const rowIndex = column.indexOf(removedIndex);
        if (rowIndex !== -1) {
          removedColumn = columnIndex;
          removedRow = rowIndex;
        }
      });

      const removedColumnFlex = removedColumn >= 0
        ? [...layoutState.rowFlex[removedColumn]]
        : [];

      layoutState.columnTileIndexes = layoutState.columnTileIndexes.map((column) =>
        column
          .filter((index) => index !== removedIndex)
          .map((index) => (index > removedIndex ? index - 1 : index))
      );

      layoutState.rowFlex = layoutState.rowFlex.map((columnFlex, columnIndex) => {
        const tileCount = layoutState.columnTileIndexes[columnIndex].length;
        if (!tileCount) return [];

        if (columnIndex !== removedColumn) {
          return columnFlex.slice(0, tileCount);
        }

        const removedWeight = removedColumnFlex[removedRow] ?? 0;
        const topWeights = removedColumnFlex.slice(0, removedRow);
        const bottomWeights = removedColumnFlex.slice(removedRow + 1);

        if (!bottomWeights.length) {
          if (!topWeights.length) return [];
          const nearestIndex = topWeights.length - 1;
          topWeights[nearestIndex] += removedWeight;
          return topWeights;
        }

        const bottomTotal = sumColumnWeights(bottomWeights) + removedWeight;
        const equalBottom = bottomTotal / bottomWeights.length;
        return [
          ...topWeights,
          ...Array(bottomWeights.length).fill(equalBottom)
        ];
      });

      const finalized = finalizeLayoutWeights(layoutState.rowFlex, layoutState.columnTileIndexes);
      layoutState.rowFlex = finalized.rowFlex;
      layoutState.tileHeightPx = finalized.tileHeightPx;
      layoutState.key = getLayoutKey(activeTiles, columnCount);
    }

    function removeTileAt(tileIndex) {
      if (!activeTiles || tileIndex < 0 || tileIndex >= activeTiles.length) return;

      activeTiles.splice(tileIndex, 1);
      itemCountInput.value = String(activeTiles.length);

      if (presetSelect.value.startsWith("demo")) {
        presetSelect.value = "count";
      }

      if (!activeTiles.length) {
        layoutState = { key: "", columnFlex: [], rowFlex: [], columnTileIndexes: [], tileHeightPx: null };
        renderGrid({ useActiveTiles: true });
        return;
      }

      rebalanceLayoutAfterRemoval(tileIndex);
      renderGrid({ preserveLayout: true, useActiveTiles: true });
      updateHtmlExport();
    }

    function renderTile(tile, index, columnIndex, rowIndex, columnCount, rowCount) {
      const article = document.createElement("article");
      article.className = "bento-item";
      article.dataset.column = String(columnIndex);
      article.dataset.row = String(rowIndex);
      const weight = layoutState.rowFlex[columnIndex]?.[rowIndex] ?? tile.weight ?? 1;
      applyTileFromLayout(article, columnIndex, rowIndex, weight);

      const media = document.createElement("div");
      media.className = "bento-item__media";
      media.style.setProperty(
        "--tile-image",
        tile.image?.startsWith("http") ? `url("${tile.image}")` : tile.image
      );

      const badge = document.createElement("span");
      badge.className = "bento-item__badge";
      badge.textContent = "↗";
      badge.setAttribute("aria-hidden", "true");

      const content = document.createElement("div");
      content.className = "bento-item__content";

      const category = document.createElement("p");
      category.className = "bento-item__category";
      category.textContent = tile.category ?? tile.description ?? `Tile ${index + 1}`;

      const title = document.createElement("h2");
      title.className = "bento-item__title";
      title.textContent = tile.title;

      content.append(category, title);
      article.append(media, badge, content);

      const closeBtn = document.createElement("button");
      closeBtn.type = "button";
      closeBtn.className = "bento-item__close";
      closeBtn.setAttribute("aria-label", `Remove ${tile.title}`);
      closeBtn.textContent = "×";
      closeBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        removeTileAt(index);
      });
      article.appendChild(closeBtn);

      if (isEditableLayout()) {
        if (rowIndex < rowCount - 1) {
          article.appendChild(createResizeHandle("row", columnIndex, rowIndex));
        }

        if (columnIndex < columnCount - 1) {
          article.appendChild(createResizeHandle("col", columnIndex, rowIndex));
        }

        if (rowIndex < rowCount - 1 && columnIndex < columnCount - 1) {
          article.appendChild(createResizeHandle("corner", columnIndex, rowIndex));
        }
      }

      return article;
    }

    function createColumnDragHandle(columnIndex) {
      const handle = document.createElement("button");
      handle.type = "button";
      handle.className = "column-drag-handle";
      handle.textContent = "⋮⋮";
      handle.setAttribute("aria-label", `Drag column ${columnIndex + 1} to reorder`);
      handle.dataset.column = String(columnIndex);
      handle.addEventListener("pointerdown", startColumnDrag);
      return handle;
    }

    function startColumnDrag(event) {
      if (!isEditableLayout() || activeDrag) return;

      event.preventDefault();
      event.stopPropagation();

      const handle = event.currentTarget;
      const fromIndex = Number(handle.dataset.column);

      handle.classList.add("is-active");
      handle.setPointerCapture(event.pointerId);

      columnDrag = {
        pointerId: event.pointerId,
        handle,
        fromIndex,
        overIndex: fromIndex
      };

      updateColumnDropTargets(fromIndex, fromIndex);
      document.body.classList.add("is-column-dragging");
    }

    function onColumnDragMove(event) {
      if (!columnDrag || event.pointerId !== columnDrag.pointerId) return;

      const overIndex = getColumnIndexAtX(event.clientX);

      if (overIndex !== columnDrag.overIndex) {
        columnDrag.overIndex = overIndex;
        updateColumnDropTargets(overIndex, columnDrag.fromIndex);
      }
    }

    function endColumnDrag(event) {
      if (!columnDrag || event.pointerId !== columnDrag.pointerId) return;

      const { fromIndex, overIndex, handle } = columnDrag;

      try {
        handle.releasePointerCapture(event.pointerId);
      } catch (_) {
        /* ignore */
      }

      const shouldSwap = fromIndex !== overIndex;
      columnDrag = null;
      document.body.classList.remove("is-column-dragging");
      clearColumnDropTargets();

      if (shouldSwap) {
        swapColumns(fromIndex, overIndex);
        renderGrid({ preserveLayout: true, useActiveTiles: true });
      }
    }

    function createResizeHandle(type, columnIndex, rowIndex) {
      const handle = document.createElement("button");
      handle.type = "button";
      handle.className = `resize-handle resize-handle--${type === "corner" ? "corner" : type === "col" ? "col" : "row"}`;
      handle.setAttribute("aria-label", type === "corner"
        ? "Resize tile width and height"
        : type === "col"
          ? "Resize column width"
          : "Resize tile height");
      handle.dataset.type = type;
      handle.dataset.column = String(columnIndex);
      handle.dataset.row = String(rowIndex);
      handle.addEventListener("pointerdown", startDrag);
      return handle;
    }

    function startDrag(event) {
      if (!isEditableLayout() || columnDrag) return;

      event.preventDefault();
      event.stopPropagation();

      const handle = event.currentTarget;
      const type = handle.dataset.type;
      const columnIndex = Number(handle.dataset.column);
      const rowIndex = Number(handle.dataset.row);
      const column = bentoGrid.querySelector(`.bento-column[data-column="${columnIndex}"]`);

      if (!column) return;

      ensureTileHeightPx();

      handle.classList.add("is-active");
      handle.setPointerCapture(event.pointerId);

      const items = [...column.querySelectorAll(".bento-item")];
      const columnRect = column.getBoundingClientRect();
      const gridRect = bentoGrid.getBoundingClientRect();
      const gap = parseFloat(getComputedStyle(bentoGrid).gap) || LAYOUT_GAP;
      const startTopFlex = layoutState.rowFlex[columnIndex][rowIndex];
      const startBottomFlex = layoutState.rowFlex[columnIndex][rowIndex + 1] ?? null;
      const startTopHeight = getTileHeightPx(columnIndex, rowIndex, startTopFlex);
      const startBottomHeight = startBottomFlex === null
        ? 0
        : getTileHeightPx(columnIndex, rowIndex + 1, startBottomFlex);

      activeDrag = {
        pointerId: event.pointerId,
        type,
        handle,
        columnIndex,
        rowIndex,
        startX: event.clientX,
        startY: event.clientY,
        columnRect,
        gridRect,
        gap,
        startTopFlex,
        startBottomFlex,
        startTopHeight,
        startBottomHeight,
        startLeftColFlex: layoutState.columnFlex[columnIndex],
        startRightColFlex: layoutState.columnFlex[columnIndex + 1] ?? null,
        items
      };

      items[rowIndex]?.classList.add("is-resizing");
      if (type !== "col") {
        items[rowIndex + 1]?.classList.add("is-resizing");
      }

      document.body.classList.add("is-resizing");
      document.body.style.cursor = handle.style.cursor || "grabbing";
    }

    function onDragMove(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) return;

      const {
        type,
        columnIndex,
        rowIndex,
        startX,
        startY,
        columnRect,
        gridRect,
        gap,
        startTopFlex,
        startBottomFlex,
        startLeftColFlex,
        startRightColFlex
      } = activeDrag;

      if (type === "row" || type === "corner") {
        if (startBottomFlex === null) return;

        const usableHeight = activeDrag.startTopHeight + activeDrag.startBottomHeight + gap;
        const totalRowFlex = startTopFlex + startBottomFlex;
        const deltaRatio = (event.clientY - startY) / usableHeight;
        const nextTop = clampFlex(startTopFlex + deltaRatio * totalRowFlex, MIN_FLEX, totalRowFlex - MIN_FLEX);
        const nextBottom = totalRowFlex - nextTop;

        layoutState.rowFlex[columnIndex][rowIndex] = nextTop;
        layoutState.rowFlex[columnIndex][rowIndex + 1] = nextBottom;

        setSharedRowHeightPx(rowIndex, weightToHeight(nextTop));
        setSharedRowHeightPx(rowIndex + 1, weightToHeight(nextBottom));
      }

      if (type === "col" || type === "corner") {
        const colGapTotal = gap * (layoutState.columnFlex.length - 1);
        const usableWidth = gridRect.width - colGapTotal;
        const totalColFlex = startLeftColFlex + startRightColFlex;
        const deltaRatio = (event.clientX - startX) / usableWidth;
        const nextLeft = clampFlex(startLeftColFlex + deltaRatio * totalColFlex, MIN_FLEX, totalColFlex - MIN_FLEX);

        layoutState.columnFlex[columnIndex] = nextLeft;
        layoutState.columnFlex[columnIndex + 1] = totalColFlex - nextLeft;

      applyFlexToGrid();
      updateHtmlExport();
    }

    function endDrag(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) return;

      const { type, columnIndex, rowIndex } = activeDrag;
      activeDrag.handle.classList.remove("is-active");
      activeDrag.items.forEach((item) => item.classList.remove("is-resizing"));

      try {
        activeDrag.handle.releasePointerCapture(event.pointerId);
      } catch (_) {
        /* ignore */
      }

      activeDrag = null;
      document.body.classList.remove("is-resizing");
      document.body.style.cursor = "";

      if (type === "row" || type === "corner") {
        updateTileHeightsAfterRowResize(columnIndex, rowIndex);
        applyFlexToGrid();
      }

      updateHtmlExport();
    }

    document.addEventListener("pointermove", (event) => {
      onDragMove(event);
      onColumnDragMove(event);
    });
    document.addEventListener("pointerup", (event) => {
      endDrag(event);
      endColumnDrag(event);
    });
    document.addEventListener("pointercancel", (event) => {
      endDrag(event);
      endColumnDrag(event);
    });

    function renderGrid(options = {}) {
      const { forceResetLayout = false, preserveLayout = false, useActiveTiles = false } = options;

      if (activeDrag || columnDrag) return;

      bentoGrid.innerHTML = "";

      let tiles;

      if (useActiveTiles && activeTiles) {
        tiles = activeTiles;
      } else {
        try {
          tiles = resolveTiles();
          activeTiles = tiles.map((tile) => ({ ...tile }));
        } catch (error) {
          bentoGrid.innerHTML = `<div class="empty-state">${error.message}</div>`;
          stats.innerHTML = `<span><strong>Error:</strong> could not render grid</span>`;
          htmlExport.hidden = true;
          return;
        }
      }

      if (!tiles.length) {
        bentoGrid.innerHTML = `<div class="empty-state">No tiles to display. Increase the box count or load a demo preset.</div>`;
        stats.innerHTML = `<span><strong>0</strong> tiles rendered</span>`;
        htmlExport.hidden = true;
        htmlOutput.value = "";
        activeTiles = [];
        return;
      }

      currentTiles = tiles;
      currentColumnCount = getColumnCount();

      if (!preserveLayout) {
        ensureLayoutState(tiles, currentColumnCount, forceResetLayout);
      }

      layoutState.columnTileIndexes.forEach((tileIndexes, columnIndex) => {
        if (!tileIndexes.length) return;

        const column = document.createElement("div");
        column.className = "bento-column";
        column.dataset.column = String(columnIndex);
        column.style.flex = `${layoutState.columnFlex[columnIndex] ?? 1} 1 0%`;

        if (isEditableLayout()) {
          column.appendChild(createColumnDragHandle(columnIndex));
        }

        tileIndexes.forEach((tileIndex, rowIndex) => {
          const tile = {
            ...tiles[tileIndex],
            weight: layoutState.rowFlex[columnIndex]?.[rowIndex] ?? 1
          };

          column.appendChild(renderTile(
            tile,
            tileIndex,
            columnIndex,
            rowIndex,
            currentColumnCount,
            tileIndexes.length
          ));
        });

        bentoGrid.appendChild(column);
      });

      const columnSizes = layoutState.columnTileIndexes.map((column) => column.length).join(" + ");
      const editHint = previewMode === "desktop"
        ? "Resize with handles · reorder columns · click × to remove"
        : "Mobile preview · 1 column · click × to remove tiles";

      stats.innerHTML = `
        <span><strong>${tiles.length}</strong> tile${tiles.length === 1 ? "" : "s"} rendered</span>
        <span>Preview: <strong>${previewMode}</strong> · Columns: <strong>${currentColumnCount}</strong> (${columnSizes})</span>
        <span>${editHint}</span>
      `;

      updateHtmlExport();
    }

    viewDesktopBtn.addEventListener("click", () => setPreviewMode("desktop"));
    viewMobileBtn.addEventListener("click", () => setPreviewMode("mobile"));

    document.getElementById("renderBtn").addEventListener("click", () => renderGrid({ forceResetLayout: true }));
    document.getElementById("addBtn").addEventListener("click", () => {
      itemCountInput.value = String(Math.min(24, Number(itemCountInput.value) + 1));
      if (presetSelect.value.startsWith("demo")) presetSelect.value = "count";
      renderGrid();
    });
    document.getElementById("removeBtn").addEventListener("click", () => {
      itemCountInput.value = String(Math.max(0, Number(itemCountInput.value) - 1));
      if (presetSelect.value.startsWith("demo")) presetSelect.value = "count";
      renderGrid();
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      presetSelect.value = "demo10";
      itemCountInput.value = "10";
      renderGrid({ forceResetLayout: true });
    });
    document.getElementById("resetLayoutBtn").addEventListener("click", () => {
      renderGrid({ forceResetLayout: true });
    });
    document.getElementById("copyHtmlBtn").addEventListener("click", async () => {
      updateHtmlExport();
      const payload = htmlOutput.value;
      try {
        await navigator.clipboard.writeText(payload);
        stats.innerHTML += `<span><strong>HTML copied</strong></span>`;
      } catch (_) {
        htmlOutput.select();
        document.execCommand("copy");
      }
    });

    itemCountInput.addEventListener("change", () => {
      if (presetSelect.value.startsWith("demo")) presetSelect.value = "count";
      renderGrid();
    });

    presetSelect.addEventListener("change", () => {
      if (presetSelect.value === "demo10") itemCountInput.value = "10";
      if (presetSelect.value === "demo7") itemCountInput.value = "7";
      renderGrid({ forceResetLayout: true });
    });

    updatePreviewChrome();
    renderGrid();
  </script>
</body>
</html>
